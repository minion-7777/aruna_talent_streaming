worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Simulated CDN cache for HLS segments
    proxy_cache_path /var/cache/nginx/hls levels=1:2 keys_zone=hls_cache:32m max_size=512m inactive=60m use_temp_path=off;

    upstream api_backend {
        least_conn;
        server api:3001 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream realtime_backend {
        least_conn;
        server realtime:3002 max_fails=3 fail_timeout=10s;
    }

    upstream web_backend {
        server web:3000;
    }

    # Ingest node HLS upstreams — add more when scaling ingest pool
    upstream hls_ingest_1 {
        server ingest-1:8888;
    }

    upstream hls_ingest_2 {
        server ingest-2:8888;
    }

    server {
        listen 8080;
        server_name _;

        # Platform entrypoint
        location / {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Backend REST API (public /v1 routes)
        location /api/v1/ {
            rewrite ^/api/v1/(.*)$ /v1/$1 break;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Next.js BFF routes (/api/streams, /api/metrics, …)
        location /api/ {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /ws {
            proxy_pass http://realtime_backend/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # HLS playback with edge caching (simulates CDN)
        location ~ ^/hls/ingest-1/(.*)$ {
            proxy_cache hls_cache;
            proxy_cache_valid 200 2s;
            proxy_cache_valid 404 1s;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Access-Control-Allow-Origin *;
            proxy_pass http://hls_ingest_1/$1;
        }

        location ~ ^/hls/ingest-2/(.*)$ {
            proxy_cache hls_cache;
            proxy_cache_valid 200 2s;
            proxy_cache_valid 404 1s;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Access-Control-Allow-Origin *;
            proxy_pass http://hls_ingest_2/$1;
        }

        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
