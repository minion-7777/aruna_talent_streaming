services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: aruna
      POSTGRES_PASSWORD: aruna
      POSTGRES_DB: aruna
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aruna -d aruna']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --save "" --appendonly no --notify-keyspace-events Ex
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgres://aruna:aruna@postgres:5432/aruna
      REDIS_URL: redis://redis:6379
      INGEST_NODES: ingest-1,ingest-2
      HLS_BASE_URL: http://localhost:8080/hls
      PUBLIC_RTMP_HOST: localhost
      PUBLIC_RTMP_PORTS: '19351,19352'
      INTERNAL_API_KEY: dev-internal-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Scale with: docker compose up -d --scale api=N  or  ./scripts/scale.sh api=N realtime=M
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health/ready']
      interval: 10s
      timeout: 5s
      retries: 5

  realtime:
    build: ./realtime
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health/ready']
      interval: 10s
      timeout: 5s
      retries: 5

  ingest-1:
    build: ./infra/mediamtx
    image: aruna-mediamtx:1.11.3
    ports:
      - '19351:1935'
    volumes:
      - ./infra/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    hostname: ingest-1
    depends_on:
      api:
        condition: service_healthy

  ingest-2:
    build: ./infra/mediamtx
    image: aruna-mediamtx:1.11.3
    ports:
      - '19352:1935'
    volumes:
      - ./infra/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    hostname: ingest-2
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_API_URL: http://localhost:8080/api
        NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
        NEXT_PUBLIC_APP_URL: http://localhost:8080
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_APP_URL: http://localhost:8080
      CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: http://localhost:8080/
      CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: http://localhost:8080/
      API_INTERNAL_URL: http://api:3001
      REALTIME_INTERNAL_URL: http://realtime:3002
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/']
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '8080:8080'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      api:
        condition: service_healthy
      realtime:
        condition: service_healthy
      web:
        condition: service_healthy

  # Optional: RTMP port exposure for OBS (maps to ingest pool via round-robin DNS)
  # Publish to rtmp://localhost:1935/live/{streamKey} — nginx stream LB could be added in prod

volumes:
  postgres_data:
  nginx_cache:
